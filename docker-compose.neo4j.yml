version: '3.8'

services:
  neo4j:
    image: neo4j:5.14.0
    container_name: neo4j_banking_rag
    ports:
      - "7474:7474"  # HTTP (Browser)
      - "7687:7687"  # Bolt (Application)
    environment:
      - NEO4J_AUTH=neo4j/banking_rag_password
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
